<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Special Assistance - Uganda Airlines</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg-primary: #FFFFFF; --bg-soft: #F8F6F1; --bg-dark: #0D1B2A; --accent-navy: #1B3A5C; --accent-gold: #C9933A; --text-primary: #1A1A1A; --text-muted: #6B7280; --border: #E5E0D8; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; color: var(--text-primary); background: var(--bg-soft); }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    nav, main { padding: 16px 0; }
    .nav-logo { display: flex; align-items: center; gap: 12px; font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 700; color: white; }
    .logo-crane { width: 32px; height: 32px; background: var(--accent-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--bg-dark); font-size: 12px; }
    .nav-links a { color: white; margin-right: 32px; text-decoration: none; }
    .section-title h2 { font-family: 'Cormorant Garamond', serif; font-size: 36px; color: var(--accent-navy); text-align: center; margin: 40px 0 20px; }
    .btn-gold { background: var(--accent-gold); color: var(--bg-dark); padding: 12px 24px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <nav style="background: var(--bg-dark);">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
      <a href="index.html" class="nav-logo"><div class="logo-crane">UR</div>Uganda Airlines</a>
      <div class="nav-links"><a href="index.html">Home</a><a href="assistance.html">Assistance</a></div>
    </div>
  </nav>
  <main class="container">
    <div class="section-title"><h2>Special Assistance</h2></div>
    <p style="margin-bottom: 24px;">We provide wheelchair assistance, priority boarding, and accessible seating. Request assistance at least 48 hours before departure.</p>
    <button class="btn-gold">Request Assistance</button>
  </main>
</body>
</html>
